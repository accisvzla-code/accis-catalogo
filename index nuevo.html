<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accis Venezuela — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --burgundy: #814256;
      --beige: #f2e9e1;
      --white: #ffffff;
      --text: #2e1a21;
      --text-muted: #9c7a84;
      --border: #e0d0d6;
      --whatsapp: #25D366;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--beige); color: var(--text); }

    /* HEADER - AJUSTE FINAL */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      position: sticky; top: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      min-height: 80px;
    }
    .logo-container { display: flex; flex-direction: column; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--burgundy); line-height: 1; }
    .header-tagline { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; letter-spacing: 1px; }

    /* BOTÓN COMPRA AQUÍ */
    .btn-wa-header {
      background: var(--whatsapp);
      color: white !important;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
      transition: 0.3s;
    }
    .btn-wa-header:hover { transform: scale(1.05); }

    /* HERO */
    .hero { background: var(--burgundy); color: white; text-align: center; padding: 40px 20px; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; }

    /* FILTROS */
    .filters-wrap { background: white; padding: 15px; position: sticky; top: 80px; z-index: 900; border-bottom: 1px solid var(--border); }
    .filters-inner { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .filter-select, .search-input { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); outline: none; background: var(--beige); }

    /* GRID */
    main { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .card { background: white; border-radius: 10px; overflow: hidden; cursor: pointer; text-align: center; padding-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; padding: 10px 5px 0; }
    .card-price { color: var(--burgundy); font-weight: 600; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 15px; width: 100%; max-width: 400px; overflow: hidden; text-align: center; }
    .modal-img { width: 100%; max-height: 300px; object-fit: cover; }
    .modal-body { padding: 20px; }
    .btn-wa-modal { background: var(--whatsapp); color: white; text-decoration: none; padding: 15px; border-radius: 30px; display: block; margin-bottom: 10px; font-weight: 600; }

    @media (max-width: 600px) {
      .btn-wa-header span { display: none; } /* En móvil solo sale el icono de WA */
      header { height: 70px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <div class="logo">Accis <span>Venezuela</span></div>
    <div class="header-tagline">Cada día, más tú</div>
  </div>
  
  <a href="https://wa.me/584241808527?text=Hola!%20Vengo%20de%20tu%20catálogo%20y%20quiero%20comprar." target="_blank" class="btn-wa-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    <span>Compra aquí</span>
  </a>
</header>

<div class="hero">
  <h1>Catálogo Accis</h1>
</div>

<div class="filters-wrap">
  <div class="filters-inner">
    <select class="filter-select" id="f-categoria"><option value="">Categorías</option></select>
    <input class="search-input" id="search" type="text" placeholder="Buscar..."/>
  </div>
</div>

<main>
  <div class="grid" id="grid">Cargando catálogo...</div>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <img id="modal-img" class="modal-img" src="" alt=""/>
    <div class="modal-body">
      <h2 id="modal-name"></h2>
      <p id="modal-price" class="modal-price"></p>
      <a id="modal-wa" href="#" target="_blank" class="btn-wa-modal">Pedir por WhatsApp</a>
      <button onclick="document.getElementById('modal-overlay').classList.remove('open')" style="background:none; border:none; color:gray; cursor:pointer;">Cerrar</button>
    </div>
  </div>
</div>

<script>
  const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzi5Gtvu1ZRwoP-uYNQf8msYr-U7fq2HBJDoxOXFYwPkDpRgef3NWqRCpKUhP9dCM__g2gSYdyZYQ6/pub?gid=313944167&single=true&output=csv';
  const COL = { nombre:1, categoria:2, precio:3, foto:9 };
  let productos = [];

  async function cargar() {
    try {
      const res = await fetch(SHEET_CSV + '&t=' + Date.now());
      const text = await res.text();
      const lines = text.trim().split('\n').slice(1);
      productos = lines.map(line => line.split(',').map(c => c.replace(/"/g, '').trim()));
      
      const cats = [...new Set(productos.map(p => p[COL.categoria]))].filter(Boolean).sort();
      document.getElementById('f-categoria').innerHTML += cats.map(c => `<option value="${c}">${c}</option>`).join('');
      
      render();
    } catch(e) { document.getElementById('grid').innerHTML = "Error al cargar datos."; }
  }

  function render() {
    const cat = document.getElementById('f-categoria').value;
    const bus = document.getElementById('search').value.toLowerCase();
    
    const filtrados = productos.filter(p => (!cat || p[COL.categoria] === cat) && (!bus || p[COL.nombre].toLowerCase().includes(bus)));
    
    document.getElementById('grid').innerHTML = filtrados.map((p, idx) => `
      <div class="card" onclick="ver(${productos.indexOf(p)})">
        <img src="${p[COL.foto]}">
        <div class="card-name">${p[COL.nombre]}</div>
        <div class="card-price">$${p[COL.precio]}</div>
      </div>
    `).join('');
  }

  function ver(i) {
    const p = productos[i];
    document.getElementById('modal-img').src = p[COL.foto];
    document.getElementById('modal-name').textContent = p[COL.nombre];
    document.getElementById('modal-price').textContent = '$' + p[COL.precio];
    document.getElementById('modal-wa').href = `https://wa.me/584241808527?text=Me%20interesa:%20${p[COL.nombre]}`;
    document.getElementById('modal-overlay').classList.add('open');
  }

  document.getElementById('f-categoria').onchange = render;
  document.getElementById('search').oninput = render;
  cargar();
</script>
</body>
</html>
